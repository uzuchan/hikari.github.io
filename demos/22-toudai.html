<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>22 霧の灯台</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="ドラッグで灯台の光をまわすと、霧の沖の小さな舟が気づいて、港へ帰ってくる。あなたは光の番人。">
<meta property="og:title" content="22 霧の灯台 — hikari">
<meta property="og:description" content="ドラッグで灯台の光をまわすと、霧の沖の小さな舟が気づいて、港へ帰ってくる。あなたは光の番人。">
<meta property="og:image" content="https://uzuchan.github.io/hikari.github.io/assets/og.png">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="stylesheet" href="../shared.css">
<style>
  #scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
  #homes {
    position: fixed;
    top: 96px;
    right: 26px;
    z-index: 11;
    font-family: var(--serif);
    font-size: 13px;
    letter-spacing: 0.22em;
    color: var(--dim);
    text-shadow: 0 0 14px rgba(255, 217, 138, 0.25);
    pointer-events: none;
  }
  @media (max-width: 640px) {
    #homes { top: 124px; font-size: 12px; }
  }
</style>
</head>
<body data-screen-label="22 霧の灯台">

<canvas id="scene"></canvas>

<div id="homes">ともった舟 — <span id="homeN">0</span></div>

<div class="hud-top">
  <div class="hud-title-block">
    <a class="hud-back" href="../index.html">← もどる</a>
    <div class="hud-no">PROTOTYPE 22</div>
    <div class="hud-title">霧の灯台</div>
  </div>
</div>

<div class="hud-bottom">
  <div class="hud-hint">ドラッグで灯台の光をまわします。霧の沖の舟は、光に気づくと灯をともし、港へ帰ってきます。</div>
  <div class="hud-tech">
    <div class="tech-row"><span class="tech-label">試作</span><span class="tech-tag">Three.js</span></div>
    <div class="tech-row"><span class="tech-label">本実装</span><span class="tech-tag primary">Unity URP / VR (OpenXR)</span></div>
  </div>
</div>

<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<script>
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.052);
const camera = new THREE.PerspectiveCamera(46, 1, 0.1, 300);
camera.position.set(0, 6.2, 14.5);
camera.lookAt(0, 1.2, 0);

const world = new THREE.Group();
scene.add(world);

const PALETTE = ['#ffd98a', '#ffaad4', '#c9a8ff', '#8ce8ff', '#f4f2ec'];

// ---- 放射グラデのテクスチャ(発光に使い回す) ----
function glowTex(color, inner = 0.0) {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(64, 64, 128 * inner, 64, 64, 64);
  grad.addColorStop(0, color);
  grad.addColorStop(0.4, color + '88');
  grad.addColorStop(1, color + '00');
  g.fillStyle = grad; g.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}
const goldTex = glowTex('#ffd98a');
const whiteTex = glowTex('#f4f2ec');

// ---- 夜空の星 ----
{
  const pts = [];
  for (let i = 0; i < 700; i++) {
    const v = new THREE.Vector3().randomDirection();
    v.y = Math.abs(v.y) * 0.9 + 0.06;            // 海面より上だけ
    v.multiplyScalar(90 + Math.random() * 80);
    pts.push(v.x, v.y, v.z);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({
    color: 0xf4f2ec, size: 0.32, transparent: true, opacity: 0.7, fog: false,
  })));
}

// ---- 海 ----
{
  const sea = new THREE.Mesh(
    new THREE.CircleGeometry(80, 48),
    new THREE.MeshBasicMaterial({ color: 0x0c1020 })
  );
  sea.rotation.x = -Math.PI / 2;
  world.add(sea);
  // 波のきらめき(ゆっくり明滅する点)
  const n = 240, pts = [], phases = [];
  for (let i = 0; i < n; i++) {
    const r = 4 + Math.random() * 36, a = Math.random() * Math.PI * 2;
    pts.push(Math.cos(a) * r, 0.03, Math.sin(a) * r);
    phases.push(Math.random() * 7);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  const m = new THREE.PointsMaterial({ color: 0x8ce8ff, size: 0.1, transparent: true, opacity: 0.35 });
  const sparkle = new THREE.Points(g, m);
  sparkle.userData.phases = phases;
  world.add(sparkle);
  world.userData.sparkle = sparkle;
}

// ---- 灯台(岩・塔・灯室) ----
const ROCK_R = 1.4;
{
  const rock = new THREE.Mesh(
    new THREE.SphereGeometry(ROCK_R, 18, 12),
    new THREE.MeshStandardMaterial({ color: 0x12141c, roughness: 1 })
  );
  rock.scale.y = 0.45;
  world.add(rock);

  const tower = new THREE.Mesh(
    new THREE.CylinderGeometry(0.22, 0.34, 2.2, 14),
    new THREE.MeshStandardMaterial({ color: 0x1a1d28, roughness: 0.9, emissive: 0x0a0c14, emissiveIntensity: 0.6 })
  );
  tower.position.y = 1.5;
  world.add(tower);

  const lampRoom = new THREE.Mesh(
    new THREE.CylinderGeometry(0.26, 0.26, 0.34, 10),
    new THREE.MeshBasicMaterial({ color: 0xffd98a })
  );
  lampRoom.position.y = 2.75;
  world.add(lampRoom);

  const cap = new THREE.Mesh(
    new THREE.ConeGeometry(0.32, 0.3, 10),
    new THREE.MeshStandardMaterial({ color: 0x141722, roughness: 0.9 })
  );
  cap.position.y = 3.05;
  world.add(cap);

  // 灯室のグロー
  const halo = new THREE.Sprite(new THREE.SpriteMaterial({ map: goldTex, transparent: true, depthWrite: false, opacity: 0.85 }));
  halo.position.y = 2.75;
  halo.scale.setScalar(2.6);
  world.add(halo);
}

// ---- 港(桟橋の二つの灯) ----
const HARBOR = new THREE.Vector3(2.6, 0, 3.4);
{
  for (const dx of [-0.55, 0.55]) {
    const p = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex('#ffaad4'), transparent: true, depthWrite: false, opacity: 0.8 }));
    const dir = HARBOR.clone().normalize();
    const side = new THREE.Vector3(-dir.z, 0, dir.x);
    p.position.copy(HARBOR).addScaledVector(side, dx).setY(0.5);
    p.scale.setScalar(1.1);
    world.add(p);
  }
}

// ---- 光線(ビーム) — ドラッグでまわす主役 ----
const BEAM_LEN = 22, BEAM_HALF = 0.22;     // 届く距離と半角(rad)
const beamGroup = new THREE.Group();
beamGroup.position.y = 2.75;
world.add(beamGroup);
{
  // 周方向に減衰する帯テクスチャ
  const c = document.createElement('canvas'); c.width = 256; c.height = 64;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0, 0, 256, 0);
  grad.addColorStop(0, 'rgba(255,217,138,0.26)');
  grad.addColorStop(0.45, 'rgba(255,217,138,0.08)');
  grad.addColorStop(1, 'rgba(255,217,138,0)');
  g.fillStyle = grad; g.fillRect(0, 0, 256, 64);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending, side: THREE.DoubleSide, fog: false,
  });
  // 横長の三角形ファン(クロス2枚で体積感)
  const shape = new THREE.PlaneGeometry(BEAM_LEN, 1.5, 1, 1);
  shape.translate(BEAM_LEN / 2, 0, 0);
  const fin1 = new THREE.Mesh(shape, mat);
  const mat2 = mat.clone();
  mat2.opacity = 0.55;
  const fin2 = new THREE.Mesh(shape.clone(), mat2);
  fin2.rotation.x = Math.PI / 2;
  beamGroup.add(fin1, fin2);
  // 先細りに見せる頂点いじり(根元3.4 → 先端1.0)
  for (const f of [fin1, fin2]) {
    const pos = f.geometry.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const k = 1 - (x / BEAM_LEN) * 0.85;
      pos.setY(i, pos.getY(i) * k);
    }
    pos.needsUpdate = true;
  }
}

// ---- 霧のきれはし ----
const wisps = [];
{
  for (let i = 0; i < 26; i++) {
    const s = new THREE.Sprite(new THREE.SpriteMaterial({
      map: whiteTex, transparent: true, depthWrite: false, opacity: 0.05,
    }));
    const r = 5 + Math.random() * 13, a = Math.random() * Math.PI * 2;
    s.position.set(Math.cos(a) * r, 0.8 + Math.random() * 1.6, Math.sin(a) * r);
    s.scale.setScalar(3.5 + Math.random() * 4);
    s.userData = { drift: (Math.random() - 0.5) * 0.05, base: 0.04 + Math.random() * 0.05 };
    world.add(s);
    wisps.push(s);
  }
}

// ---- 舟 ----
const SHIPS = 8;
const ships = [];
function spawnShip(sh) {
  const r = 12 + Math.random() * 7, a = Math.random() * Math.PI * 2;
  sh.group.position.set(Math.cos(a) * r, 0, Math.sin(a) * r);
  sh.heading = Math.random() * Math.PI * 2;
  sh.state = 'drift';
  sh.seen = 0;
  sh.lamp.material.opacity = 0.28;
  sh.lamp.scale.setScalar(0.7);
  sh.group.visible = true;
}
{
  for (let i = 0; i < SHIPS; i++) {
    const group = new THREE.Group();
    const hull = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 0.14, 0.2),
      new THREE.MeshStandardMaterial({ color: 0x141824, roughness: 1 })
    );
    hull.position.y = 0.08;
    const lamp = new THREE.Sprite(new THREE.SpriteMaterial({
      map: goldTex, transparent: true, depthWrite: false, opacity: 0.28,
    }));
    lamp.position.y = 0.34;
    lamp.scale.setScalar(0.7);
    group.add(hull, lamp);
    world.add(group);
    const sh = { group, lamp, heading: 0, state: 'drift', seen: 0 };
    spawnShip(sh);
    ships.push(sh);
  }
}

// ---- ライト ----
scene.add(new THREE.AmbientLight(0x223355, 0.5));
const moon = new THREE.DirectionalLight(0xcfe0ff, 0.35);
moon.position.set(-8, 10, -6);
scene.add(moon);

// ---- 音: 帰港のちいさな鐘(任意・全面防御) ----
let ac = null, master = null;
function ensureAudio() {
  if (ac) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    ac = new AC();
    if (ac.state === 'suspended') ac.resume().catch(() => {});
    master = ac.createGain(); master.gain.value = 0.2;
    master.connect(ac.destination);
  } catch (e) { ac = null; }
}
function bell() {
  if (!ac || !master) return;
  try {
    const t0 = ac.currentTime;
    const o = ac.createOscillator(); o.type = 'sine'; o.frequency.value = 880;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.06, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.4);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0 + 1.5);
    o.onended = () => { try { o.disconnect(); g.disconnect(); } catch (_) {} };
  } catch (e) { /* 音は飾り */ }
}

// ---- 入力: ドラッグで「光」をまわす(カメラではなく) ----
let beamAz = 0.6, beamTarget = 0.6, dragging = false, lastX = 0, idleT = 0;
canvas.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; idleT = 0; ensureAudio(); });
addEventListener('pointermove', e => {
  if (!dragging) return;
  beamTarget += (e.clientX - lastX) * 0.0075;
  lastX = e.clientX;
  idleT = 0;
});
addEventListener('pointerup', () => dragging = false);
addEventListener('pointercancel', () => dragging = false);

// ---- 帰港カウンタ ----
let homeN = 0;
const homeEl = document.getElementById('homeN');

// ---- リサイズ ----
function fit() {
  renderer.setSize(innerWidth, innerHeight, false);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
fit();
addEventListener('resize', fit);

// ---- ループ ----
const HARBOR_AZ = Math.atan2(HARBOR.x, HARBOR.z);
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  const t = now / 1000;

  // 光の操舵: 触っていなければゆっくり自走
  idleT += dt;
  if (idleT > 2.2) beamTarget += 0.22 * dt;
  beamAz += (beamTarget - beamAz) * Math.min(1, dt * 6);
  beamGroup.rotation.y = beamAz;
  canvas.dataset.beam = beamAz.toFixed(3);     // 検証用の覗き窓

  // 波のきらめき
  const sp = world.userData.sparkle;
  sp.material.opacity = 0.22 + 0.13 * Math.sin(t * 0.7);

  // 霧: ビームの帯に入ると淡く照る
  const beamDir = new THREE.Vector2(Math.sin(beamAz), Math.cos(beamAz));
  function litBy(x, z) {
    const r = Math.hypot(x, z);
    if (r < 1.5 || r > BEAM_LEN) return 0;
    const d = new THREE.Vector2(x, z).normalize();
    const ang = Math.acos(Math.max(-1, Math.min(1, d.dot(beamDir))));
    if (ang > BEAM_HALF * (1 + 2 / r)) return 0;
    return 1 - r / BEAM_LEN;
  }
  for (const w of wisps) {
    w.position.x += w.userData.drift * dt * 10;
    if (w.position.length() > 20) w.position.multiplyScalar(0.4);
    const lit = litBy(w.position.x, w.position.z);
    w.material.opacity = w.userData.base + lit * 0.22;
  }

  // 舟
  for (const sh of ships) {
    const p = sh.group.position;
    if (sh.state === 'drift') {
      sh.heading += (Math.random() - 0.5) * 0.4 * dt;
      p.x += Math.sin(sh.heading) * 0.25 * dt;
      p.z += Math.cos(sh.heading) * 0.25 * dt;
      const r = p.length();
      if (r > 19) { sh.heading += Math.PI * 0.5 * dt * 3; }
      // 光に照らされた時間を積む
      if (litBy(p.x, p.z) > 0.08) {
        sh.seen += dt;
        sh.lamp.material.opacity = Math.min(0.9, 0.28 + sh.seen * 1.2);
        if (sh.seen > 0.45) {
          sh.state = 'guided';
          sh.lamp.scale.setScalar(1.25);
          sh.lamp.material.opacity = 0.95;
        }
      } else {
        sh.seen = Math.max(0, sh.seen - dt * 0.6);
        sh.lamp.material.opacity = Math.max(0.28, sh.lamp.material.opacity - dt * 0.5);
      }
    } else if (sh.state === 'guided') {
      // 港へ
      const to = new THREE.Vector3().subVectors(HARBOR, p);
      const want = Math.atan2(to.x, to.z);
      let dh = want - sh.heading;
      while (dh > Math.PI) dh -= Math.PI * 2;
      while (dh < -Math.PI) dh += Math.PI * 2;
      sh.heading += Math.max(-1.4 * dt, Math.min(1.4 * dt, dh));
      p.x += Math.sin(sh.heading) * 0.85 * dt;
      p.z += Math.cos(sh.heading) * 0.85 * dt;
      if (to.length() < 1.0) {
        sh.state = 'docked';
        homeN++;
        homeEl.textContent = homeN;
        canvas.dataset.home = homeN;             // 検証用
        bell();
        // しばらく桟橋で灯ってから、新しい舟として沖へ
        sh.dockT = 0;
      }
    } else if (sh.state === 'docked') {
      sh.dockT = (sh.dockT || 0) + dt;
      sh.lamp.material.opacity = 0.9 - Math.min(0.6, sh.dockT * 0.18);
      if (sh.dockT > 5) spawnShip(sh);
    }
    // 舟のゆれ
    sh.group.position.y = Math.sin(t * 1.3 + sh.heading * 7) * 0.035;
    sh.group.rotation.y = sh.heading;
    sh.group.rotation.z = Math.sin(t * 1.1 + sh.heading * 5) * 0.05;
  }

  // カメラの微ドリフト(船酔いしない程度)
  camera.position.x = Math.sin(t * 0.05) * 0.8;
  camera.lookAt(0, 1.2, 0);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
