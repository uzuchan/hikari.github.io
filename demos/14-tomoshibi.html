<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>14 ふれると灯る街</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="ふれた窓から灯がともり、人影と星が増える夜の街。放っておくと灯りはひとつずつ眠る。">
<meta property="og:title" content="14 ふれると灯る街 — hikari">
<meta property="og:description" content="ふれた窓から灯がともり、人影と星が増える夜の街。放っておくと灯りはひとつずつ眠る。">
<meta property="og:image" content="https://uzuchan.github.io/hikari.github.io/assets/og.png">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="stylesheet" href="../shared.css">
<style>
  /* デモ固有のスタイルだけここに。共通は shared.css に置く。 */
</style>
</head>
<body data-screen-label="14 ふれると灯る街">

<canvas id="cv" class="stage"></canvas>

<div class="hud-top">
  <div class="hud-title-block">
    <a class="hud-back" href="../index.html">← もどる</a>
    <div class="hud-no">PROTOTYPE 14</div>
    <div class="hud-title">ふれると灯る街</div>
  </div>
</div>

<div class="hud-bottom">
  <div class="hud-hint">暗い街並みにふれると、窓明かりがひとつずつ灯ります。灯りが増えると人影が行き交い、空に星が増える。<br>しばらく放っておくと、灯りはひとつずつ眠るように消えていきます。</div>
  <div class="hud-tech">
    <div class="tech-row"><span class="tech-label">試作</span><span class="tech-tag">Canvas 2D</span></div>
    <div class="tech-row"><span class="tech-label">本実装</span><span class="tech-tag primary">Unity + タッチウォール (C#)</span></div>
  </div>
</div>

<script>
// ---- 土台: DPR対応キャンバス ----
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
const DPR = Math.min(devicePixelRatio, 2);
let W, H;

const PALETTE = ['#ffd98a', '#ffaad4', '#c9a8ff', '#8ce8ff', '#f4f2ec'];
// 窓明かりは --glow-gold 中心。まれに差し色が混じる
const WINDOW_COLORS = ['#ffd98a', '#ffd98a', '#ffd98a', '#ffe6b8', '#ffd98a', '#ffaad4'];

// ---- 発光スプライト（事前レンダ）----
function makeGlow(color, size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0, color + 'cc');
  grad.addColorStop(0.35, color + '55');
  grad.addColorStop(1, color + '00');
  g.fillStyle = grad;
  g.fillRect(0, 0, size, size);
  return c;
}
const GLOWS = {};
for (const c of WINDOW_COLORS.concat(['#f4f2ec', '#8ce8ff'])) {
  if (!GLOWS[c]) GLOWS[c] = makeGlow(c, 64);
}

// ---- 街の生成 ----
let buildings = [];   // { x, w, top, kind, windows:[], roof }
let stars = [];       // { x, y, r, ph, order }
let walkers = [];     // { x, dir, sp, ph, life, c }
let sparks = [];      // タップの火花
let ripples = [];     // 空タップの波紋
let streetY = 0;

function rnd(a, b) { return a + Math.random() * (b - a); }

function makeWindows(b) {
  // 建物内に窓グリッドを敷く
  const ww = rnd(5, 7) * DPR, wh = rnd(6, 9) * DPR;
  const gx = ww + rnd(6, 11) * DPR, gy = wh + rnd(8, 13) * DPR;
  const mx = 7 * DPR, mtop = (b.kind === 'house' ? 6 : 12) * DPR;
  const cols = Math.max(1, Math.floor((b.w - mx * 2) / gx));
  const rows = Math.max(1, Math.floor((streetY - b.top - mtop - 8 * DPR) / gy));
  const ox = b.x + (b.w - cols * gx + (gx - ww)) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      b.windows.push({
        x: ox + c * gx, y: b.top + mtop + r * gy,
        w: ww, h: wh,
        lit: 0, target: 0,
        c: WINDOW_COLORS[Math.floor(Math.random() * WINDOW_COLORS.length)],
        ph: Math.random() * 7
      });
    }
  }
}

function generateCity() {
  buildings = []; walkers = []; sparks = []; ripples = [];
  streetY = H * 0.96;
  const skyline = H * 0.5;     // 街は画面下半分
  let x = -rnd(10, 40) * DPR;
  while (x < W) {
    const roll = Math.random();
    let kind, w, h;
    if (roll < 0.18) {        // 塔 — 細く高い
      kind = 'tower'; w = rnd(26, 44) * DPR; h = rnd(0.34, 0.46) * H;
    } else if (roll < 0.52) { // 家 — 低く三角屋根
      kind = 'house'; w = rnd(46, 80) * DPR; h = rnd(0.10, 0.17) * H;
    } else {                  // ビル
      kind = 'building'; w = rnd(56, 110) * DPR; h = rnd(0.18, 0.40) * H;
    }
    h = Math.min(h, skyline * 0.96);
    const b = {
      x, w, kind,
      top: streetY - h,
      windows: [],
      ant: kind === 'building' && Math.random() < 0.4   // アンテナ
    };
    makeWindows(b);
    buildings.push(b);
    x += w + rnd(-6, 14) * DPR;  // 少し重なったり隙間が空いたり
  }
  // 星 — 灯りの数に応じて order 順に現れる
  stars = Array.from({ length: 220 }, (_, i) => ({
    x: Math.random() * W,
    y: Math.random() * H * 0.55,
    r: (0.5 + Math.random() * 1.1) * DPR,
    ph: Math.random() * 7,
    order: i
  }));
  for (let i = stars.length - 1; i > 0; i--) {  // orderをシャッフル
    const j = Math.floor(Math.random() * (i + 1));
    [stars[i].order, stars[j].order] = [stars[j].order, stars[i].order];
  }
}

function resize() {
  W = cv.width = innerWidth * DPR;
  H = cv.height = innerHeight * DPR;
  generateCity();   // リサイズで街並みを再生成
}
resize();
addEventListener('resize', resize);

// ---- 灯す / 消す ----
let lastTouch = performance.now();
let nextSleep = 0;

function litCount() {
  let n = 0;
  for (const b of buildings) for (const w of b.windows) if (w.target > 0) n++;
  return n;
}

function lightOne(b, px, py) {
  // タップ位置に近い未点灯の窓から灯す
  let best = null, bd = Infinity;
  for (const w of b.windows) {
    if (w.target > 0) continue;
    const d = (w.x - px) ** 2 + (w.y - py) ** 2;
    if (d < bd) { bd = d; best = w; }
  }
  if (!best) return false;
  best.target = 1;
  for (let i = 0; i < 7; i++) {
    sparks.push({
      x: best.x + best.w / 2, y: best.y + best.h / 2,
      vx: rnd(-1, 1) * DPR, vy: rnd(-1.4, -0.2) * DPR,
      life: 1, c: best.c
    });
  }
  return true;
}

function sleepOne() {
  const lit = [];
  for (const b of buildings) for (const w of b.windows) if (w.target > 0) lit.push(w);
  if (!lit.length) return;
  lit[Math.floor(Math.random() * lit.length)].target = 0;
}

addEventListener('pointerdown', e => {
  const px = e.clientX * DPR, py = e.clientY * DPR;
  lastTouch = performance.now();
  let hit = false;
  for (const b of buildings) {
    if (px >= b.x && px <= b.x + b.w && py >= b.top - 14 * DPR && py <= streetY) {
      if (lightOne(b, px, py)) { hit = true; break; }
    }
  }
  if (!hit) {
    // 建物以外（または満灯）→ 一番近い建物に灯す。空高くなら波紋だけ
    if (py > H * 0.42) {
      let best = null, bd = Infinity;
      for (const b of buildings) {
        const cxx = b.x + b.w / 2;
        const d = Math.abs(cxx - px);
        if (d < bd) { bd = d; best = b; }
      }
      if (best) hit = lightOne(best, px, py);
    }
    if (!hit) ripples.push({ x: px, y: py, r: 4 * DPR, life: 1 });
  }
});

// ---- 人影 ----
function spawnWalker() {
  const fromLeft = Math.random() < 0.5;
  walkers.push({
    x: fromLeft ? -10 * DPR : W + 10 * DPR,
    dir: fromLeft ? 1 : -1,
    sp: rnd(0.25, 0.7) * DPR,
    ph: Math.random() * 7,
    life: 0,
    c: Math.random() < 0.75 ? '#ffd98a' : '#f4f2ec'
  });
}

// ---- 描画ループ ----
function loop(t) {
  const now = performance.now();
  const lit = litCount();

  // 放置で眠る：8秒さわらないと、約1.1秒ごとにひとつ消える
  if (now - lastTouch > 8000 && now > nextSleep) {
    sleepOne();
    nextSleep = now + 1100;
  }

  // 空 — ほんのり地平が明るむ。灯りが多いほど街明かりが空に映る
  const sky = cx.createLinearGradient(0, 0, 0, H);
  const cityGlow = Math.min(lit / 60, 1);
  sky.addColorStop(0, '#07070c');
  sky.addColorStop(0.6, '#0a0a12');
  sky.addColorStop(1, `rgba(${24 + cityGlow * 18},${20 + cityGlow * 14},${30 + cityGlow * 8},1)`);
  cx.fillStyle = sky;
  cx.fillRect(0, 0, W, H);

  // 星 — 灯りの数 × 3 個まで現れる
  const starN = Math.min(stars.length, lit * 3);
  for (const s of stars) {
    if (s.order >= starN) continue;
    const tw = 0.4 + 0.6 * Math.sin(t * 0.0016 + s.ph) ** 2;
    cx.globalAlpha = 0.25 + 0.55 * tw;
    cx.fillStyle = '#f4f2ec';
    cx.beginPath(); cx.arc(s.x, s.y, s.r * (0.7 + 0.3 * tw), 0, 7); cx.fill();
  }
  cx.globalAlpha = 1;

  // 街のシルエット
  cx.fillStyle = '#04040a';
  for (const b of buildings) {
    cx.beginPath();
    if (b.kind === 'house') {
      const ridge = b.top - b.w * 0.18;
      cx.moveTo(b.x, streetY);
      cx.lineTo(b.x, b.top);
      cx.lineTo(b.x + b.w / 2, ridge);
      cx.lineTo(b.x + b.w, b.top);
      cx.lineTo(b.x + b.w, streetY);
    } else if (b.kind === 'tower') {
      cx.moveTo(b.x, streetY);
      cx.lineTo(b.x, b.top);
      cx.lineTo(b.x + b.w / 2, b.top - b.w * 0.9);
      cx.lineTo(b.x + b.w, b.top);
      cx.lineTo(b.x + b.w, streetY);
    } else {
      cx.rect(b.x, b.top, b.w, streetY - b.top);
    }
    cx.closePath();
    cx.fill();
    if (b.ant) {
      cx.strokeStyle = '#04040a';
      cx.lineWidth = 1.6 * DPR;
      cx.beginPath();
      cx.moveTo(b.x + b.w * 0.5, b.top);
      cx.lineTo(b.x + b.w * 0.5, b.top - 16 * DPR);
      cx.stroke();
    }
  }

  // 窓 — 未点灯はかすかな枠、点灯はにじむ金の光
  for (const b of buildings) {
    for (const w of b.windows) {
      w.lit += (w.target - w.lit) * (w.target ? 0.06 : 0.02);
      if (w.lit < 0.01) {
        cx.fillStyle = 'rgba(244,242,236,0.028)';
        cx.fillRect(w.x, w.y, w.w, w.h);
        continue;
      }
      const flick = 0.85 + 0.15 * Math.sin(t * 0.004 + w.ph) * Math.sin(t * 0.0011 + w.ph * 3);
      const a = w.lit * flick;
      const gs = w.w * 6;
      cx.globalAlpha = a * 0.7;
      cx.drawImage(GLOWS[w.c], w.x + w.w / 2 - gs / 2, w.y + w.h / 2 - gs / 2, gs, gs);
      cx.globalAlpha = a;
      cx.fillStyle = w.c;
      cx.fillRect(w.x, w.y, w.w, w.h);
    }
  }
  cx.globalAlpha = 1;

  // 通り — 地面とほのかな照り返し
  cx.fillStyle = '#030308';
  cx.fillRect(0, streetY, W, H - streetY);
  if (lit > 0) {
    cx.globalAlpha = Math.min(lit / 40, 0.5);
    const rg = cx.createLinearGradient(0, streetY, 0, H);
    rg.addColorStop(0, 'rgba(255,217,138,0.10)');
    rg.addColorStop(1, 'rgba(255,217,138,0)');
    cx.fillStyle = rg;
    cx.fillRect(0, streetY, W, H - streetY);
    cx.globalAlpha = 1;
  }

  // 人影 — 灯り3つにつき1人、通りを行き交う
  const targetWalkers = Math.min(16, Math.floor(lit / 3));
  if (walkers.length < targetWalkers && Math.random() < 0.02) spawnWalker();
  walkers = walkers.filter(p => p.x > -20 * DPR && p.x < W + 20 * DPR && p.life > -0.01);
  for (const p of walkers) {
    const fading = walkers.length > targetWalkers + 2;
    p.life += fading ? -0.008 : (p.life < 1 ? 0.02 : 0);
    p.x += p.dir * p.sp;
    const bob = Math.sin(t * 0.012 + p.ph) * 1.2 * DPR;
    const y = streetY - 3 * DPR + bob * 0.4;
    const a = Math.max(0, Math.min(1, p.life)) * (0.5 + 0.3 * Math.sin(t * 0.006 + p.ph));
    cx.globalAlpha = a * 0.8;
    const gs = 22 * DPR;
    cx.drawImage(GLOWS[p.c], p.x - gs / 2, y - gs / 2, gs, gs);
    cx.globalAlpha = a;
    cx.fillStyle = p.c;
    cx.beginPath(); cx.arc(p.x, y, 1.6 * DPR, 0, 7); cx.fill();
  }
  cx.globalAlpha = 1;

  // 火花
  sparks = sparks.filter(s => s.life > 0.03);
  for (const s of sparks) {
    s.x += s.vx; s.y += s.vy; s.vy += 0.02 * DPR;
    s.life -= 0.025;
    cx.globalAlpha = s.life;
    cx.fillStyle = s.c;
    cx.beginPath(); cx.arc(s.x, s.y, 1.2 * DPR * s.life + 0.4 * DPR, 0, 7); cx.fill();
  }
  cx.globalAlpha = 1;

  // 空タップの波紋
  ripples = ripples.filter(r => r.life > 0.03);
  for (const r of ripples) {
    r.r += 1.6 * DPR; r.life -= 0.03;
    cx.globalAlpha = r.life * 0.35;
    cx.strokeStyle = '#8ce8ff';
    cx.lineWidth = 1.2 * DPR;
    cx.beginPath(); cx.arc(r.x, r.y, r.r, 0, 7); cx.stroke();
  }
  cx.globalAlpha = 1;

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
