<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16 クラゲの天蓋</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="暗い海の底、頭上に漂う発光の群れ。触れれば光が連鎖する。ドラッグで深海を見回す。">
<meta property="og:title" content="16 クラゲの天蓋 — hikari">
<meta property="og:description" content="暗い海の底、頭上に漂う発光の群れ。触れれば光が連鎖する。ドラッグで深海を見回す。">
<meta property="og:image" content="https://uzuchan.github.io/hikari.github.io/assets/og.png">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="stylesheet" href="../shared.css">
<style>
  #scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
</style>
</head>
<body data-screen-label="16 クラゲの天蓋">

<canvas id="scene"></canvas>

<div class="hud-top">
  <div class="hud-title-block">
    <a class="hud-back" href="../index.html">← もどる</a>
    <div class="hud-no">PROTOTYPE 16</div>
    <div class="hud-title">クラゲの天蓋</div>
  </div>
</div>

<div class="hud-bottom">
  <div class="hud-hint">ドラッグで海底から見回す ／ クラゲをタップすると光が脈打ち、群れへ連鎖する</div>
  <div class="hud-tech">
    <div class="tech-row"><span class="tech-label">試作</span><span class="tech-tag">Three.js</span></div>
    <div class="tech-row"><span class="tech-label">本実装</span><span class="tech-tag primary">Unity URP / VR (OpenXR)</span></div>
  </div>
</div>

<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<script>
// ---- 土台: レンダラ / シーン / カメラ ----
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07080d);   // --ink に寄せた深海の黒
scene.fog = new THREE.FogExp2(0x07080d, 0.030);

// 海の底から頭上を見上げる視点
const camera = new THREE.PerspectiveCamera(62, 1, 0.1, 200);
camera.position.set(0, 0.4, 0);
camera.rotation.order = 'YXZ';
let yaw = 0, pitch = 1.05;          // 見上げた状態から始まる
let yawT = 0, pitchT = 1.05;

const PALETTE = ['#ffd98a', '#ffaad4', '#c9a8ff', '#8ce8ff', '#f4f2ec'];

// ---- ライト ----
scene.add(new THREE.AmbientLight(0x1c2336, 0.6));         // 環境光を絞り、自発光を主役にする
const moon = new THREE.DirectionalLight(0x6a8cc8, 0.35);  // 遥か上の月光
moon.position.set(3, 10, 2);
scene.add(moon);

// ---- 海中の微粒子（マリンスノー：星空の転用）----
const snowTex = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(32, 32, 2, 32, 32, 30);
  gr.addColorStop(0, 'rgba(255,255,255,1)');
  gr.addColorStop(0.4, 'rgba(255,255,255,0.4)');
  gr.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = gr; g.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
})();
const SNOW_N = 500;
const snowGeo = new THREE.BufferGeometry();
const snowPos = new Float32Array(SNOW_N * 3);
for (let i = 0; i < SNOW_N; i++) {
  snowPos[i * 3]     = (Math.random() - 0.5) * 60;
  snowPos[i * 3 + 1] = Math.random() * 30 - 2;
  snowPos[i * 3 + 2] = (Math.random() - 0.5) * 60;
}
snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
const snow = new THREE.Points(snowGeo, new THREE.PointsMaterial({
  map: snowTex, color: 0xbcd4e8, size: 0.14, transparent: true, opacity: 0.5,
  depthWrite: false, blending: THREE.AdditiveBlending
}));
scene.add(snow);

// ---- 遥か上の水面のゆらめき（淡い光の幕）----
const surfaceTex = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(128, 128, 20, 128, 128, 128);
  gr.addColorStop(0, 'rgba(120,170,230,0.30)');
  gr.addColorStop(0.6, 'rgba(90,130,200,0.10)');
  gr.addColorStop(1, 'rgba(90,130,200,0)');
  g.fillStyle = gr; g.fillRect(0, 0, 256, 256);
  return new THREE.CanvasTexture(c);
})();
const surface = new THREE.Sprite(new THREE.SpriteMaterial({
  map: surfaceTex, transparent: true, depthWrite: false, opacity: 0.8
}));
surface.position.set(0, 26, 0);
surface.scale.setScalar(70);
scene.add(surface);

// ---- クラゲ ----
const glowTex = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(64, 64, 4, 64, 64, 64);
  gr.addColorStop(0, 'rgba(255,255,255,0.9)');
  gr.addColorStop(0.35, 'rgba(255,255,255,0.30)');
  gr.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = gr; g.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
})();

const JELLY_N = 24;
const TENT_N = 7;            // 触手の本数
const TENT_SEG = 7;          // 触手の節数
const bellGeo = new THREE.SphereGeometry(1, 20, 10, 0, Math.PI * 2, 0, Math.PI * 0.55); // 半球の傘（共有）
const jellies = [];
const bellMeshes = [];       // Raycaster の対象

for (let i = 0; i < JELLY_N; i++) {
  const color = new THREE.Color(PALETTE[i % PALETTE.length]);
  const group = new THREE.Group();

  // 天蓋状に頭上へ配置（中央ほど高く）
  const a = (i / JELLY_N) * Math.PI * 2 + Math.random() * 0.6;
  const r = 2.5 + Math.pow(Math.random(), 0.7) * 13;
  const x = Math.cos(a) * r;
  const z = Math.sin(a) * r;
  const y = 13.5 - r * 0.32 + (Math.random() - 0.5) * 3.5;
  group.position.set(x, y, z);

  const size = 0.6 + Math.random() * 0.65;

  // 半透明の傘
  const bellMat = new THREE.MeshStandardMaterial({
    color: color.clone().multiplyScalar(0.18),
    emissive: color, emissiveIntensity: 0.95,
    transparent: true, opacity: 0.5,
    roughness: 0.3, metalness: 0.0,
    side: THREE.DoubleSide, depthWrite: false
  });
  const bell = new THREE.Mesh(bellGeo, bellMat);
  bell.scale.set(size, size * 0.85, size);
  bell.userData.jelly = i;
  group.add(bell);
  bellMeshes.push(bell);

  // 体内の光（外周のにじみ）
  const glow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex, color: color.clone(), transparent: true,
    opacity: 0.55, depthWrite: false, blending: THREE.AdditiveBlending
  }));
  glow.scale.setScalar(size * 2.6);
  glow.position.y = size * 0.25;
  group.add(glow);

  // コアグロー（傘の芯で強く灯る小さな光）
  const core = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex, color: color.clone().lerp(new THREE.Color('#f4f2ec'), 0.35),
    transparent: true, opacity: 0.75, depthWrite: false, blending: THREE.AdditiveBlending
  }));
  core.scale.setScalar(size * 1.1);
  core.position.y = size * 0.3;
  group.add(core);

  // 揺れる触手（LineSegments を毎フレーム更新）
  const tentGeo = new THREE.BufferGeometry();
  const tentPos = new Float32Array(TENT_N * TENT_SEG * 2 * 3);
  tentGeo.setAttribute('position', new THREE.BufferAttribute(tentPos, 3));
  const tentMat = new THREE.LineBasicMaterial({
    color: color.clone(), transparent: true, opacity: 0.40,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  group.add(new THREE.LineSegments(tentGeo, tentMat));

  scene.add(group);
  jellies.push({
    group, bell, bellMat, glow, core, tentGeo, tentMat,
    color, size,
    phase: Math.random() * Math.PI * 2,
    swimSpeed: 0.6 + Math.random() * 0.5,
    drift: { a: Math.random() * Math.PI * 2, r: 0.4 + Math.random() * 0.6, s: 0.05 + Math.random() * 0.07 },
    baseY: y,
    pulse: 0,                // 0..1 発光の脈
    pulseAt: -1,             // 予約時刻（連鎖用）
    wave: -1                 // 連鎖の波ID（再点火防止）
  });
}

// ---- 発光の連鎖 ----
const CHAIN_R = 7.5;         // この距離以内のクラゲへ伝播
const CHAIN_SPEED = 0.16;    // 距離1あたりの遅延（秒）
let waveId = 0;

function ignite(j, wave, now) {
  j.pulse = 1;
  j.wave = wave;
  // 近くの未点火のクラゲへ予約
  for (const k of jellies) {
    if (k === j || k.wave === wave) continue;
    const d = j.group.position.distanceTo(k.group.position);
    if (d < CHAIN_R) {
      k.wave = wave;
      k.pulseAt = now + d * CHAIN_SPEED;
    }
  }
}

// ---- 入力：ドラッグで見回す / タップで点火（Raycaster）----
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
let dragging = false, moved = 0, px = 0, py = 0;

canvas.addEventListener('pointerdown', e => {
  dragging = true; moved = 0; px = e.clientX; py = e.clientY;
});
addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - px, dy = e.clientY - py;
  moved += Math.abs(dx) + Math.abs(dy);
  yawT   -= dx * 0.004;
  pitchT += dy * 0.004;
  pitchT = Math.max(0.1, Math.min(1.45, pitchT));
  px = e.clientX; py = e.clientY;
});
addEventListener('pointerup', e => {
  if (dragging && moved < 8) {                  // タップ判定
    ndc.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
    ray.setFromCamera(ndc, camera);
    const hits = ray.intersectObjects(bellMeshes);
    if (hits.length) {
      const j = jellies[hits[0].object.userData.jelly];
      ignite(j, ++waveId, clock.elapsedTime);
    }
  }
  dragging = false;
});
addEventListener('pointercancel', () => dragging = false);

// ---- リサイズ ----
function fit() {
  renderer.setSize(innerWidth, innerHeight, false);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
fit();
addEventListener('resize', fit);

// ---- ループ ----
const clock = new THREE.Clock();

function loop() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // 視線：なめらかに追従
  yaw   += (yawT - yaw) * 6 * dt;
  pitch += (pitchT - pitch) * 6 * dt;
  camera.rotation.set(pitch, yaw, 0);
  camera.position.y = 0.4 + Math.sin(t * 0.5) * 0.08;   // 海中で身体がゆっくり浮き沈み

  for (const j of jellies) {
    // 連鎖の予約が来たら点火
    if (j.pulseAt >= 0 && t >= j.pulseAt) {
      j.pulseAt = -1;
      ignite(j, j.wave, t);
    }
    j.pulse = Math.max(0, j.pulse - dt * 0.8);
    const p = j.pulse * j.pulse;                         // 鋭く灯りゆっくり消える

    // 泳ぎ：傘の収縮と漂い
    const swim = Math.sin(t * j.swimSpeed + j.phase);
    const squash = 1 + swim * 0.13 + p * 0.22;
    j.bell.scale.set(j.size * (2 - squash) * 0.92, j.size * 0.85 * squash, j.size * (2 - squash) * 0.92);
    j.drift.a += j.drift.s * dt;
    j.group.position.x += Math.cos(j.drift.a) * j.drift.r * dt * 0.3;
    j.group.position.z += Math.sin(j.drift.a) * j.drift.r * dt * 0.3;
    j.group.position.y = j.baseY + Math.sin(t * 0.3 + j.phase) * 0.55 + swim * 0.06;
    j.group.rotation.y += dt * 0.05;

    // 発光：脈打ち
    const breathe = Math.sin(t * 0.9 + j.phase);
    j.bellMat.emissiveIntensity = 0.95 + breathe * 0.20 + p * 2.4;
    j.bellMat.opacity = 0.5 + p * 0.2;
    j.glow.material.opacity = 0.55 + breathe * 0.12 + p * 0.45;
    j.glow.scale.setScalar(j.size * (2.6 + p * 2.2));
    j.core.material.opacity = 0.75 + breathe * 0.15 + p * 0.25;
    j.core.scale.setScalar(j.size * (1.1 + p * 0.9));
    j.tentMat.opacity = 0.40 + p * 0.5;

    // 触手：傘の縁から垂れ、波打つ
    const arr = j.tentGeo.attributes.position.array;
    let o = 0;
    const rimR = j.size * 0.8;
    const segLen = j.size * 0.55;
    for (let k = 0; k < TENT_N; k++) {
      const a = (k / TENT_N) * Math.PI * 2;
      const bx = Math.cos(a) * rimR, bz = Math.sin(a) * rimR;
      let x0 = bx, y0 = j.size * 0.1, z0 = bz;
      for (let s = 1; s <= TENT_SEG; s++) {
        const sway = Math.sin(t * 1.6 + j.phase + k * 1.7 + s * 0.7) * 0.085 * s * (1 + p * 1.5);
        const x1 = bx + Math.cos(a + 1.3) * sway;
        const z1 = bz + Math.sin(a + 1.3) * sway;
        const y1 = j.size * 0.1 - s * segLen;
        arr[o++] = x0; arr[o++] = y0; arr[o++] = z0;
        arr[o++] = x1; arr[o++] = y1; arr[o++] = z1;
        x0 = x1; y0 = y1; z0 = z1;
      }
    }
    j.tentGeo.attributes.position.needsUpdate = true;
  }

  // マリンスノー：ゆっくり降り、わずかに揺れる
  const sArr = snowGeo.attributes.position.array;
  for (let i = 0; i < SNOW_N; i++) {
    sArr[i * 3 + 1] -= dt * 0.25;
    sArr[i * 3]     += Math.sin(t * 0.4 + i) * 0.002;
    if (sArr[i * 3 + 1] < -2) sArr[i * 3 + 1] += 32;
  }
  snowGeo.attributes.position.needsUpdate = true;

  // 水面のゆらめき
  surface.material.opacity = 0.65 + Math.sin(t * 0.6) * 0.15;

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
