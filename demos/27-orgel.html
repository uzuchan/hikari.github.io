<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>27 星のオルゴール</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="まわる筒に、光のピンを植える。再生の線を横切るたび、音と光がこぼれる。夜にひとつだけの旋律を。">
<meta property="og:title" content="27 星のオルゴール — hikari">
<meta property="og:description" content="まわる筒に、光のピンを植える。再生の線を横切るたび、音と光がこぼれる。夜にひとつだけの旋律を。">
<meta property="og:image" content="https://uzuchan.github.io/hikari.github.io/assets/og.png">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="stylesheet" href="../shared.css">
<style>
  #scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
</style>
</head>
<body data-screen-label="27 星のオルゴール">

<canvas id="scene"></canvas>

<div class="hud-top">
  <div class="hud-title-block">
    <a class="hud-back" href="../index.html">← もどる</a>
    <div class="hud-no">PROTOTYPE 27</div>
    <div class="hud-title">星のオルゴール</div>
  </div>
</div>

<div class="hud-bottom">
  <div class="hud-hint">まわる筒にふれると、光のピンが植わります。金の線を横切るたび、音がこぼれます。<br>もういちどふれると、ピンは消えます。あなただけの旋律をどうぞ。</div>
  <div class="hud-tech">
    <div class="tech-row"><span class="tech-label">試作</span><span class="tech-tag">Three.js + Web Audio</span></div>
    <div class="tech-row"><span class="tech-label">本実装</span><span class="tech-tag primary">Unity URP / VR (OpenXR)</span></div>
  </div>
</div>

<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<script>
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.045);
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
camera.position.set(0, 1.3, 7.2);
camera.lookAt(0, 0.6, 0);

const world = new THREE.Group();
scene.add(world);

const PALETTE = ['#ffd98a', '#ffaad4', '#c9a8ff', '#8ce8ff', '#f4f2ec'];

function glowTex(color) {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(64, 64, 0, 64, 64, 64);
  grad.addColorStop(0, '#fffbe8');
  grad.addColorStop(0.3, color);
  grad.addColorStop(0.65, color + '55');
  grad.addColorStop(1, color + '00');
  g.fillStyle = grad; g.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}
const pinTexes = PALETTE.map(glowTex);

// ---- 星空 ----
{
  const pts = [];
  for (let i = 0; i < 600; i++) {
    const v = new THREE.Vector3().randomDirection().multiplyScalar(60 + Math.random() * 60);
    pts.push(v.x, Math.abs(v.y) * 0.8 + 2, v.z);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({
    color: 0xf4f2ec, size: 0.22, transparent: true, opacity: 0.65, fog: false,
  })));
}

// ---- オルゴールの筒 ----
const COLS = 16, ROWS = 6;
const R = 1.9, CYL_H = 2.6, Y0 = 0.6;   // 半径・高さ・中心y
const cyl = new THREE.Group();
cyl.position.y = Y0;
world.add(cyl);

// 筒body(ほぼ闇に沈む円筒+うっすら縁)
{
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(R * 0.985, R * 0.985, CYL_H, 48, 1, true),
    new THREE.MeshStandardMaterial({
      color: 0x12141f, roughness: 0.92, metalness: 0.2,
      emissive: 0x0a0c16, emissiveIntensity: 0.7,
      side: THREE.DoubleSide,
    })
  );
  cyl.add(body);
  for (const dy of [-CYL_H / 2, CYL_H / 2]) {
    const rim = new THREE.Mesh(
      new THREE.TorusGeometry(R * 0.99, 0.012, 8, 64),
      new THREE.MeshBasicMaterial({ color: 0x3a3f58 })
    );
    rim.rotation.x = Math.PI / 2;
    rim.position.y = dy;
    cyl.add(rim);
  }
}

// セルの座標
function cellPos(col, row, radius = R) {
  const a = (col / COLS) * Math.PI * 2;
  const y = ((row + 0.5) / ROWS - 0.5) * CYL_H;
  return { a, x: Math.sin(a) * radius, y, z: Math.cos(a) * radius };
}

// 空セルの淡い点(打てる場所のしるし)
{
  const pts = [], n = COLS * ROWS;
  for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) {
    const p = cellPos(c, r, R * 1.0);
    pts.push(p.x, p.y, p.z);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  const dots = new THREE.Points(g, new THREE.PointsMaterial({
    color: 0x6a7090, size: 0.045, transparent: true, opacity: 0.5,
  }));
  cyl.add(dots);
}

// ピン(セルごとの Sprite。トグルで visible 切替)
const pins = [];           // [col][row] = sprite
for (let c = 0; c < COLS; c++) {
  pins.push([]);
  for (let r = 0; r < ROWS; r++) {
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({
      map: pinTexes[r % PALETTE.length],
      transparent: true, depthWrite: false, opacity: 0.95,
    }));
    const p = cellPos(c, r, R * 1.02);
    sp.position.set(p.x, p.y, p.z);
    sp.scale.setScalar(0.22);
    sp.visible = false;
    sp.userData = { flash: 0 };
    cyl.add(sp);
    pins[c].push(sp);
  }
}

// ---- 再生の線(正面、金) ----
const PLAY_A = 0;           // ワールド方位 z+ 正面
{
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, Y0 - CYL_H / 2 - 0.15, R * 1.06),
    new THREE.Vector3(0, Y0 + CYL_H / 2 + 0.15, R * 1.06),
  ]);
  world.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0xffd98a, transparent: true, opacity: 0.85 })));
  const halo = new THREE.Sprite(new THREE.SpriteMaterial({ map: pinTexes[0], transparent: true, depthWrite: false, opacity: 0.3 }));
  halo.position.set(0, Y0, R * 1.06);
  halo.scale.set(0.5, CYL_H + 0.5, 1);
  world.add(halo);
}

// 足元のほのかな台座
{
  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(R * 1.25, R * 1.4, 0.1, 48),
    new THREE.MeshStandardMaterial({ color: 0x0e1018, roughness: 1 })
  );
  base.position.y = Y0 - CYL_H / 2 - 0.2;
  world.add(base);
}

scene.add(new THREE.AmbientLight(0x223355, 0.55));
const key = new THREE.DirectionalLight(0xcfe0ff, 0.4);
key.position.set(-5, 6, 6);
scene.add(key);

// ---- 音 ----
let ac = null, master = null, delaySend = null;
function ensureAudio() {
  if (ac) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    ac = new AC();
    if (ac.state === 'suspended') ac.resume().catch(() => {});
    master = ac.createGain(); master.gain.value = 0.22;
    master.connect(ac.destination);
    delaySend = ac.createGain(); delaySend.gain.value = 0.3;
    const d = ac.createDelay(1); d.delayTime.value = 0.31;
    const fb = ac.createGain(); fb.gain.value = 0.28;
    delaySend.connect(d); d.connect(fb); fb.connect(d);
    const wet = ac.createGain(); wet.gain.value = 0.4;
    d.connect(wet); wet.connect(master);
  } catch (e) { ac = null; }
}
// 行→音(上の行ほど高い。Aマイナーペンタトニック)
const SEMIS = [0, 3, 5, 7, 10, 12];
function rowFreq(row) { return 440 * Math.pow(2, SEMIS[ROWS - 1 - row] / 12); }
function chime(row) {
  if (!ac || !master) return;
  try {
    const t0 = ac.currentTime;
    const o = ac.createOscillator(); o.type = 'sine'; o.frequency.value = rowFreq(row);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.16, t0 + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.1);
    o.connect(g); g.connect(master);
    if (delaySend) g.connect(delaySend);
    o.start(t0); o.stop(t0 + 1.2);
    o.onended = () => { try { o.disconnect(); g.disconnect(); } catch (_) {} };
  } catch (e) { /* 音は飾り */ }
}

// ---- タップでピンを植える/抜く ----
const ray = new THREE.Raycaster();
const cylBodyForHit = new THREE.Mesh(
  new THREE.CylinderGeometry(R, R, CYL_H, 32),
  new THREE.MeshBasicMaterial({ visible: false })
);
cylBodyForHit.position.y = Y0;
scene.add(cylBodyForHit);

let pinCount = 0;
function toggleAt(clientX, clientY) {
  const ndc = new THREE.Vector2(
    (clientX / innerWidth) * 2 - 1,
    -(clientY / innerHeight) * 2 + 1
  );
  ray.setFromCamera(ndc, camera);
  const hit = ray.intersectObject(cylBodyForHit, false)[0];
  if (!hit) return false;
  const lp = hit.point.clone();
  // 筒のローカル方位(回転を差し引く)
  let a = Math.atan2(lp.x, lp.z) - cyl.rotation.y;
  a = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const col = Math.round(a / (Math.PI * 2) * COLS) % COLS;
  const yy = (lp.y - Y0) / CYL_H + 0.5;
  const row = Math.max(0, Math.min(ROWS - 1, Math.floor(yy * ROWS)));
  const sp = pins[col][row];
  sp.visible = !sp.visible;
  sp.userData.flash = sp.visible ? 1 : 0;
  pinCount += sp.visible ? 1 : -1;
  canvas.dataset.pins = pinCount;         // 検証用の覗き窓
  if (sp.visible) chime(row);
  return true;
}
addEventListener('pointerdown', e => {
  if (e.target.closest && e.target.closest('.hud-top, .hud-bottom')) return;
  ensureAudio();
  toggleAt(e.clientX, e.clientY);
});

// ---- お手本の旋律(まばらな星) ----
{
  const seed = [[0, 5], [2, 3], [4, 4], [6, 1], [8, 5], [10, 2], [12, 4], [14, 0]];
  for (const [c, r] of seed) {
    pins[c][r].visible = true;
    pinCount++;
  }
  canvas.dataset.pins = pinCount;
}

// ---- 再生: 線を横切ったピンが鳴る ----
let lastA = 0, notesPlayed = 0;
function crossCheck() {
  const a0 = lastA, a1 = cyl.rotation.y;
  lastA = a1;
  for (let c = 0; c < COLS; c++) {
    // ピン列cのワールド方位 = c/COLS*2π + cyl.rotation.y。正面(0)を横切ったか
    const cellA = (c / COLS) * Math.PI * 2;
    const w0 = norm(cellA + a0), w1 = norm(cellA + a1);
    // 0(=2π)跨ぎの検出
    if (w0 > Math.PI * 1.7 && w1 < Math.PI * 0.3) {
      for (let r = 0; r < ROWS; r++) {
        const sp = pins[c][r];
        if (!sp.visible) continue;
        sp.userData.flash = 1;
        chime(r);
        notesPlayed++;
      }
      if (pins[c].some(s => s.visible)) canvas.dataset.notes = notesPlayed;
    }
  }
}
function norm(a) { return ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2); }

// ---- リサイズ・ループ ----
function fit() {
  renderer.setSize(innerWidth, innerHeight, false);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
fit();
addEventListener('resize', fit);

let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  const t = now / 1000;

  cyl.rotation.y += 0.42 * dt;     // 一周 ~15秒
  crossCheck();

  // ピンの瞬きと脈
  for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) {
    const sp = pins[c][r];
    if (!sp.visible) continue;
    const f = sp.userData.flash;
    sp.scale.setScalar(0.22 + f * 0.26);
    sp.material.opacity = 0.7 + f * 0.3;
    sp.userData.flash = Math.max(0, f - dt * 2.2);
  }

  // カメラの微ドリフト
  camera.position.x = Math.sin(t * 0.07) * 0.5;
  camera.position.y = 1.3 + Math.sin(t * 0.05) * 0.12;
  camera.lookAt(0, Y0, 0);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
