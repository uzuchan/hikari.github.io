<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>26 しずかの森</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="指をそっと置いて、動かないでいる。しずけさに、臆病な光たちがなついて寄ってくる。うごくと、にげてしまう。">
<meta property="og:title" content="26 しずかの森 — hikari">
<meta property="og:description" content="指をそっと置いて、動かないでいる。しずけさに、臆病な光たちがなついて寄ってくる。うごくと、にげてしまう。">
<meta property="og:image" content="https://uzuchan.github.io/hikari.github.io/assets/og.png">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="stylesheet" href="../shared.css">
</head>
<body data-screen-label="26 しずかの森">

<canvas id="cv" class="stage"></canvas>

<div class="hud-top">
  <div class="hud-title-block">
    <a class="hud-back" href="../index.html">← もどる</a>
    <div class="hud-no">PROTOTYPE 26</div>
    <div class="hud-title">しずかの森</div>
  </div>
</div>

<div class="hud-bottom">
  <div class="hud-hint">指をそっと置いて、動かさないでいてください。しずけさに、光がなついて寄ってきます。<br>うごくと、にげてしまいます。長くしずかにしていると、めずらしいものも来ます。</div>
  <div class="hud-tech">
    <div class="tech-row"><span class="tech-label">試作</span><span class="tech-tag">Canvas 2D（静止検出）</span></div>
    <div class="tech-row"><span class="tech-label">本実装</span><span class="tech-tag primary">Azure Kinect（静止検出）+ 投影</span></div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W, H, DPR = Math.min(devicePixelRatio, 2);

const PALETTE = ['#ffd98a', '#ffaad4', '#c9a8ff', '#8ce8ff', '#f4f2ec'];

// ---- 発光スプライト ----
function glowSprite(c, size = 64) {
  const s = document.createElement('canvas');
  s.width = s.height = size;
  const g = s.getContext('2d');
  const gr = g.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  gr.addColorStop(0, '#fffbe8');
  gr.addColorStop(0.3, c);
  gr.addColorStop(0.65, c + '44');
  gr.addColorStop(1, c + '00');
  g.fillStyle = gr;
  g.fillRect(0, 0, size, size);
  return s;
}
const moteSprites = PALETTE.map(c => glowSprite(c));

// 蝶(羽の2楕円。羽ばたきは scaleX で表す)
function butterflySprite(c) {
  const s = document.createElement('canvas');
  s.width = 96; s.height = 64;
  const g = s.getContext('2d');
  g.translate(48, 32);
  g.shadowColor = c; g.shadowBlur = 14;
  g.fillStyle = c;
  g.globalAlpha = 0.9;
  g.beginPath(); g.ellipse(-13, 0, 13, 20, -0.25, 0, 7); g.fill();
  g.beginPath(); g.ellipse(13, 0, 13, 20, 0.25, 0, 7); g.fill();
  g.globalAlpha = 1;
  g.fillStyle = '#fffbe8';
  g.beginPath(); g.ellipse(0, 0, 2.6, 9, 0, 0, 7); g.fill();
  return s;
}
const butterflies = ['#ffaad4', '#c9a8ff'].map(butterflySprite);

let trees = [], stars = [];
function resize() {
  W = cv.width = innerWidth * DPR;
  H = cv.height = innerHeight * DPR;
  // 森のへり(下辺の木立シルエット)
  trees = [];
  const n = Math.max(6, Math.floor(W / DPR / 130));
  for (let i = 0; i < n; i++) {
    trees.push({
      x: (i + 0.5) / n * W + (Math.random() - 0.5) * 40 * DPR,
      w: (26 + Math.random() * 50) * DPR,
      h: (70 + Math.random() * 150) * DPR,
      lean: (Math.random() - 0.5) * 0.12,
    });
  }
  stars = Array.from({ length: 70 }, () => ({
    x: Math.random() * W, y: Math.random() * H * 0.6,
    r: (0.5 + Math.random() * 1.1) * DPR,
    ph: Math.random() * 7,
  }));
}
resize();
addEventListener('resize', resize);

// ---- 静止の検出 ----
const P = { x: -1, y: -1, present: false };
let still = 0;          // 静止の秒数
let lastMoveAt = 0;
let scareFlash = 0;

function onMove(x, y, forceScare) {
  const px = x * DPR, py = y * DPR;
  const moved = P.present ? Math.hypot(px - P.x, py - P.y) : 0;
  P.x = px; P.y = py; P.present = true;
  if (forceScare || moved > 9 * DPR) {
    if (still > 1.2) scare();        // なついていた時だけ「逃げる」
    still = 0;
    lastMoveAt = performance.now();
  }
}
addEventListener('pointerdown', e => {
  if (e.target.closest && e.target.closest('.hud-top, .hud-bottom')) return;
  onMove(e.clientX, e.clientY, false);
});
addEventListener('pointermove', e => {
  if (e.target.closest && e.target.closest('.hud-top, .hud-bottom')) return;
  onMove(e.clientX, e.clientY, false);
});
addEventListener('pointerleave', () => { P.present = false; });

// ---- 生きものたち ----
// kind: 0=光蟲(いつでも) 1=蝶(8秒〜) 2=精霊(20秒〜、ひとつだけ)
let beings = [];
let spawnT = 0;
let spiritOut = false;

function spawn(kind) {
  const edge = Math.floor(Math.random() * 4);
  const x = edge === 0 ? -30 * DPR : edge === 1 ? W + 30 * DPR : Math.random() * W;
  const y = edge === 2 ? -30 * DPR : edge === 3 ? H + 30 * DPR : Math.random() * H;
  beings.push({
    kind,
    x, y,
    vx: 0, vy: 0,
    ph: Math.random() * 7,
    ci: Math.floor(Math.random() * (kind === 1 ? 2 : PALETTE.length)),
    orbR: (50 + Math.random() * 110) * DPR * (kind === 2 ? 1.9 : 1),
    orbW: (0.25 + Math.random() * 0.4) * (Math.random() < 0.5 ? 1 : -1),
    s: kind === 2 ? (90 + Math.random() * 40) * DPR
       : kind === 1 ? (26 + Math.random() * 14) * DPR
       : (7 + Math.random() * 10) * DPR,
    fleeing: false,
    a: 0,
  });
  if (kind === 2) spiritOut = true;
  cv.dataset.beings = beings.length;     // 検証用の覗き窓
}

function scare() {
  for (const b of beings) b.fleeing = true;
  scareFlash = 1;
  spiritOut = false;
}

// ---- ループ ----
let last = performance.now();
function loop(now) {
  const t = now;
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  cx.fillStyle = 'rgba(8,8,14,0.28)';
  cx.fillRect(0, 0, W, H);

  // 星
  for (const s of stars) {
    cx.globalAlpha = 0.2 + 0.25 * Math.sin(t * 0.0012 + s.ph);
    cx.fillStyle = '#f4f2ec';
    cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, 7); cx.fill();
  }
  cx.globalAlpha = 1;

  // 森のへり
  cx.fillStyle = 'rgba(10,11,18,0.92)';
  for (const tr of trees) {
    cx.save();
    cx.translate(tr.x, H);
    cx.rotate(tr.lean);
    cx.beginPath();
    cx.moveTo(-tr.w / 2, 0);
    cx.quadraticCurveTo(-tr.w * 0.18, -tr.h * 0.85, 0, -tr.h);
    cx.quadraticCurveTo(tr.w * 0.18, -tr.h * 0.85, tr.w / 2, 0);
    cx.closePath();
    cx.fill();
    cx.restore();
  }

  // 静止の積算
  if (P.present) still += dt;
  cv.dataset.still = still.toFixed(1);

  // 指のそばの、しずけさの輪(静止が深まるほど淡く広がる)
  if (P.present && still > 0.8) {
    const k = Math.min(1, (still - 0.8) / 10);
    cx.globalAlpha = 0.05 + k * 0.06;
    cx.strokeStyle = '#f4f2ec';
    cx.lineWidth = 1 * DPR;
    cx.beginPath();
    cx.arc(P.x, P.y, (40 + k * 60 + Math.sin(t * 0.0015) * 6) * DPR, 0, 7);
    cx.stroke();
    cx.globalAlpha = 1;
  }

  // 生まれる(静止しているあいだだけ)
  if (P.present && still > 1.5 && beings.filter(b => !b.fleeing).length < 26) {
    spawnT -= dt;
    if (spawnT <= 0) {
      spawnT = 1.0 + Math.random() * 1.6;
      let kind = 0;
      if (still > 20 && !spiritOut && Math.random() < 0.3) kind = 2;
      else if (still > 8 && Math.random() < 0.35) kind = 1;
      spawn(kind);
    }
  }

  // おどろきの瞬き(画面端がかすかに鳴る)
  if (scareFlash > 0.01) {
    scareFlash *= 0.9;
    cx.globalAlpha = scareFlash * 0.12;
    cx.fillStyle = '#c9a8ff';
    cx.fillRect(0, 0, W, H);
    cx.globalAlpha = 1;
  }

  // 生きものの動き
  for (let i = beings.length - 1; i >= 0; i--) {
    const b = beings[i];
    if (b.fleeing) {
      // いちばん近い縁へ逃げる
      const tx = b.x < W / 2 ? -80 * DPR : W + 80 * DPR;
      b.vx += (tx - b.x) * 0.0012;
      b.vy += (Math.random() - 0.5) * 2 * DPR;
      b.vx *= 0.97; b.vy *= 0.97;
      b.x += b.vx; b.y += b.vy;
      b.a = Math.max(0, b.a - dt * 1.4);
      if (b.a <= 0 || b.x < -100 * DPR || b.x > W + 100 * DPR) {
        beings.splice(i, 1);
        cv.dataset.beings = beings.length;
        continue;
      }
    } else if (P.present) {
      // 指のまわりをめぐる(なつく)
      b.ph += b.orbW * dt;
      const tx = P.x + Math.cos(b.ph) * b.orbR;
      const ty = P.y + Math.sin(b.ph) * b.orbR * 0.7;
      b.x += (tx - b.x) * (b.kind === 2 ? 0.008 : 0.03);
      b.y += (ty - b.y) * (b.kind === 2 ? 0.008 : 0.03);
      b.a = Math.min(b.kind === 2 ? 0.5 : 0.95, b.a + dt * 0.5);
    } else {
      b.a = Math.max(0, b.a - dt * 0.3);
      if (b.a <= 0) { beings.splice(i, 1); cv.dataset.beings = beings.length; continue; }
    }

    // 描画
    if (b.kind === 1) {
      const flap = Math.abs(Math.sin(t * 0.012 + b.ph * 3));
      cx.save();
      cx.translate(b.x, b.y);
      cx.scale(0.3 + flap * 0.7, 1);
      cx.globalAlpha = b.a;
      cx.drawImage(butterflies[b.ci], -b.s / 2, -b.s / 3, b.s, b.s * 0.66);
      cx.restore();
    } else if (b.kind === 2) {
      // 精霊 — 大きく、淡く、ゆっくり明滅
      cx.globalAlpha = b.a * (0.7 + 0.3 * Math.sin(t * 0.001 + b.ph));
      cx.drawImage(moteSprites[4], b.x - b.s / 2, b.y - b.s / 2, b.s, b.s);
      cx.globalAlpha = b.a * 0.8;
      cx.drawImage(moteSprites[2], b.x - b.s / 4, b.y - b.s / 4, b.s / 2, b.s / 2);
    } else {
      cx.globalAlpha = b.a * (0.6 + 0.4 * Math.sin(t * 0.004 + b.ph * 2));
      cx.drawImage(moteSprites[b.ci], b.x - b.s / 2, b.y - b.s / 2, b.s, b.s);
    }
    cx.globalAlpha = 1;
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
