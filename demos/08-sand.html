<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>08 光の砂庭</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="発光する砂の禅庭。なぞると砂紋が描かれ、紋様の交差から光の虫が生まれる。やがて風が紋を消す。">
<meta property="og:title" content="08 光の砂庭 — hikari">
<meta property="og:description" content="発光する砂の禅庭。なぞると砂紋が描かれ、紋様の交差から光の虫が生まれる。やがて風が紋を消す。">
<meta property="og:image" content="https://uzuchan.github.io/hikari.github.io/assets/og.png">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="stylesheet" href="../shared.css">
</head>
<body data-screen-label="08 光の砂庭">

<canvas id="cv" class="stage"></canvas>

<div class="hud-top">
  <div class="hud-title-block">
    <a class="hud-back" href="../index.html">← もどる</a>
    <div class="hud-no">PROTOTYPE 08</div>
    <div class="hud-title">光の砂庭</div>
  </div>
</div>

<div class="hud-bottom">
  <div class="hud-hint">指でなぞると、光る砂紋が描かれます。紋様が交差した場所からは光の虫が生まれます。<br>手を止めると、風が少しずつ紋様を消していきます——無常。</div>
  <div class="hud-tech">
    <div class="tech-row"><span class="tech-label">試作</span><span class="tech-tag">Canvas 2D</span></div>
    <div class="tech-row"><span class="tech-label">本実装</span><span class="tech-tag primary">TouchDesigner + 赤外タッチ</span></div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W, H, DPR = Math.min(devicePixelRatio, 2);

// 砂紋レイヤー（ゆっくり風化する）
const sand = document.createElement('canvas');
const sx = sand.getContext('2d', { willReadFrequently: true });

let grains = []; // 背景の砂粒
function resize() {
  W = cv.width = innerWidth*DPR;
  H = cv.height = innerHeight*DPR;
  sand.width = W; sand.height = H;
  grains = Array.from({length: 240}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    a: 0.04 + Math.random()*0.1, r: (0.6+Math.random()*1.2)*DPR,
    ph: Math.random()*7
  }));
}
resize();
addEventListener('resize', resize);

let bugs = [];
let drawingP = null;
let raking = false;

function rake(from, to) {
  const dx = to.x-from.x, dy = to.y-from.y;
  const d = Math.hypot(dx, dy) || 1;
  const nx = -dy/d, ny = dx/d;
  // 交差チェック（描く前に下が光っているか）
  let crossed = false;
  try {
    const px = sx.getImageData(Math.round(to.x), Math.round(to.y), 1, 1).data;
    crossed = px[3] > 90;
  } catch (e) {}

  sx.lineCap = 'round';
  // 熊手＝5本の平行線
  for (let i=-2; i<=2; i++) {
    const off = i * 7 * DPR;
    const w = i === 0 ? 2.6*DPR : 1.6*DPR;
    sx.strokeStyle = i === 0 ? 'rgba(255,225,160,0.95)' : 'rgba(255,217,138,0.55)';
    sx.shadowColor = '#ffd98a';
    sx.shadowBlur = 8*DPR;
    sx.lineWidth = w;
    sx.beginPath();
    sx.moveTo(from.x + nx*off, from.y + ny*off);
    sx.lineTo(to.x + nx*off, to.y + ny*off);
    sx.stroke();
  }
  sx.shadowBlur = 0;

  if (crossed && Math.random() < 0.3 && bugs.length < 60) {
    bugs.push({
      x: to.x, y: to.y,
      a: Math.random()*Math.PI*2,
      sp: (0.4+Math.random()*0.8)*DPR,
      life: 1, ph: Math.random()*7,
      c: Math.random() < 0.5 ? '#b8ffc2' : '#8ce8ff'
    });
  }
}

addEventListener('pointerdown', e => { raking = true; drawingP = {x: e.clientX*DPR, y: e.clientY*DPR}; });
addEventListener('pointermove', e => {
  if (!raking) return;
  const p = {x: e.clientX*DPR, y: e.clientY*DPR};
  if (Math.hypot(p.x-drawingP.x, p.y-drawingP.y) > 4*DPR) {
    rake(drawingP, p);
    drawingP = p;
  }
});
addEventListener('pointerup', () => raking = false);

// ---- ループ ----
let frame = 0;
function loop(t) {
  frame++;

  // 風化：砂紋レイヤーをゆっくり減衰
  if (frame % 4 === 0) {
    sx.globalCompositeOperation = 'destination-out';
    sx.fillStyle = 'rgba(0,0,0,0.012)';
    sx.fillRect(0,0,W,H);
    sx.globalCompositeOperation = 'source-over';
  }

  // 背景
  cx.fillStyle = '#0a0a0f';
  cx.fillRect(0,0,W,H);

  // 砂粒のきらめき
  for (const g of grains) {
    const a = g.a * (0.5 + 0.5*Math.sin(t*0.0015 + g.ph));
    cx.fillStyle = `rgba(244,242,236,${a})`;
    cx.beginPath(); cx.arc(g.x, g.y, g.r, 0, 7); cx.fill();
  }

  // 砂紋
  cx.drawImage(sand, 0, 0);

  // 光の虫
  bugs = bugs.filter(b => b.life > 0.02);
  for (const b of bugs) {
    b.a += (Math.random()-0.5)*0.3;
    b.x += Math.cos(b.a)*b.sp;
    b.y += Math.sin(b.a)*b.sp;
    b.life -= 0.0022;
    const tw = 0.5 + 0.5*Math.sin(t*0.008 + b.ph*5);
    cx.globalAlpha = b.life * (0.4 + 0.6*tw);
    cx.shadowColor = b.c;
    cx.shadowBlur = 14*DPR;
    cx.fillStyle = b.c;
    cx.beginPath();
    cx.arc(b.x, b.y, (1.8 + tw*1.4)*DPR, 0, 7);
    cx.fill();
    cx.shadowBlur = 0;
  }
  cx.globalAlpha = 1;

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
